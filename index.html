function TierBar({ tier, range, description, color, maxVal = 850 }) {
  const nums = range.match(/\d+/g);
  const lo = parseInt(nums[0]);
  const hi = parseInt(nums[1] || nums[0]);
  return (
    <div style={{ marginBottom: 18 }}>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "baseline", marginBottom: 6 }}>
        <span style={{ fontWeight: 700, fontSize: 14, color: "var(--text)" }}>{tier}</span>
        <span style={{ fontFamily: "var(--font-mono)", fontSize: 15, fontWeight: 800, color }}>{range}</span>
      </div>
      <div style={{ height: 26, background: "var(--bar-track)", borderRadius: 8, position: "relative", overflow: "hidden" }}>
        <div style={{
          position: "absolute", left: `${(lo / maxVal) * 100}%`, width: `${((hi - lo) / maxVal) * 100}%`,
          height: "100%", background: `linear-gradient(90deg, ${color}99, ${color})`,
          borderRadius: 8, boxShadow: `0 0 12px ${color}44`,
        }} />
      </div>
      <div style={{ fontSize: 12, color: "var(--muted)", marginTop: 5 }}>{description}</div>
    </div>
  );
}

function PermitTimelineChart({ data }) {
  const w = 680, h = 280, pad = { t: 30, r: 20, b: 50, l: 60 };
  const pw = w - pad.l - pad.r, ph = h - pad.t - pad.b;
  const maxY = Math.max(...data.map(d => d.cumulative)) * 1.15;
  return (
    <svg viewBox={`0 0 ${w} ${h}`} style={{ width: "100%", height: "auto", display: "block" }}>
      {[0, 0.25, 0.5, 0.75, 1].map((pct, i) => {
        const y = pad.t + ph - pct * ph;
        return (<g key={i}>
          <line x1={pad.l} y1={y} x2={w - pad.r} y2={y} stroke="#2A2D28" strokeWidth={1} />
          <text x={pad.l - 8} y={y + 4} textAnchor="end" fill="#8A8678" fontSize={10} fontFamily="JetBrains Mono, monospace">{Math.round(pct * maxY).toLocaleString()}</text>
        </g>);
      })}
      {data.map((d, i) => {
        const barW = (pw / data.length) * 0.6;
        const x = pad.l + (pw / data.length) * (i + 0.5) - barW / 2;
        const barH = (d.cumulative / maxY) * ph;
        const y = pad.t + ph - barH;
        return (<g key={i}>
          <rect x={x} y={y} width={barW} height={barH} rx={4} fill="url(#permitGrad)" opacity={0.9} />
          <text x={x + barW / 2} y={y - 6} textAnchor="middle" fill="#22C55E" fontSize={11} fontWeight={700} fontFamily="JetBrains Mono, monospace">{d.cumulative.toLocaleString()}</text>
          <text x={x + barW / 2} y={h - 10} textAnchor="middle" fill="#8A8678" fontSize={9} fontFamily="JetBrains Mono, monospace" transform={`rotate(-25, ${x + barW / 2}, ${h - 10})`}>{d.month}</text>
        </g>);
      })}
      <defs><linearGradient id="permitGrad" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stopColor="#22C55E" /><stop offset="100%" stopColor="#16A34A" /></linearGradient></defs>
    </svg>
  );
}

function CorrelationChart({ data }) {
  const w = 700, h = 340, pad = { t: 40, r: 50, b: 60, l: 55 };
  const pw = w - pad.l - pad.r, ph = h - pad.t - pad.b;
  const maxPermits = Math.max(...data.map(d => d.permits)) * 1.15;
  const maxCost = Math.max(...data.map(d => Math.max(d.avgBuildCost, d.medianLotPrice, d.avgSalePrice))) * 1.12;
  const scalePermits = (v) => pad.t + ph - (v / maxPermits) * ph;
  const scaleCost = (v) => pad.t + ph - (v / maxCost) * ph;
  const xPos = (i) => pad.l + (pw / (data.length - 1)) * i;
  const makeLine = (key, fn) => data.map((d, i) => `${i === 0 ? "M" : "L"}${xPos(i)},${fn(d[key])}`).join(" ");
  const permitLine = makeLine("permits", scalePermits);
  const buildLine = makeLine("avgBuildCost", scaleCost);
  const lotLine = makeLine("medianLotPrice", scaleCost);
  const saleLine = makeLine("avgSalePrice", scaleCost);
  const permitArea = `${permitLine} L${xPos(data.length - 1)},${pad.t + ph} L${xPos(0)},${pad.t + ph} Z`;

  return (
    <svg viewBox={`0 0 ${w} ${h}`} style={{ width: "100%", height: "auto", display: "block" }}>
      {[0, 0.25, 0.5, 0.75, 1].map((pct, i) => {
        const y = pad.t + ph - pct * ph;
        return <line key={i} x1={pad.l} y1={y} x2={w - pad.r} y2={y} stroke="#2A2D28" strokeWidth={1} />;
      })}
      {[0, 0.25, 0.5, 0.75, 1].map((pct, i) => (
        <text key={`l${i}`} x={pad.l - 8} y={pad.t + ph - pct * ph + 4} textAnchor="end" fill="#FACC15" fontSize={9} fontFamily="JetBrains Mono, monospace">${Math.round(pct * maxCost)}</text>
      ))}
      {[0, 0.25, 0.5, 0.75, 1].map((pct, i) => (
        <text key={`r${i}`} x={w - pad.r + 5} y={pad.t + ph - pct * ph + 4} textAnchor="start" fill="#22C55E" fontSize={9} fontFamily="JetBrains Mono, monospace">{Math.round(pct * maxPermits)}</text>
      ))}
      {data.map((d, i) => (
        <text key={i} x={xPos(i)} y={h - 12} textAnchor="middle" fill="#8A8678" fontSize={9} fontFamily="JetBrains Mono, monospace" transform={`rotate(-25, ${xPos(i)}, ${h - 12})`}>{d.month}</text>
      ))}
      <path d={permitArea} fill="#22C55E" opacity={0.08} />
      <path d={permitLine} fill="none" stroke="#22C55E" strokeWidth={3} strokeLinecap="round" />
      <path d={buildLine} fill="none" stroke="#EF4444" strokeWidth={2.5} strokeLinecap="round" strokeDasharray="6 3" />
      <path d={saleLine} fill="none" stroke="#FACC15" strokeWidth={2.5} strokeLinecap="round" />
      <path d={lotLine} fill="none" stroke="#3B82F6" strokeWidth={2.5} strokeLinecap="round" strokeDasharray="2 4" />
      {data.map((d, i) => (
        <g key={i}>
          <circle cx={xPos(i)} cy={scalePermits(d.permits)} r={4} fill="#22C55E" />
          <circle cx={xPos(i)} cy={scaleCost(d.avgBuildCost)} r={3.5} fill="#EF4444" />
          <circle cx={xPos(i)} cy={scaleCost(d.avgSalePrice)} r={3.5} fill="#FACC15" />
          <circle cx={xPos(i)} cy={scaleCost(d.medianLotPrice)} r={3.5} fill="#3B82F6" />
        </g>
      ))}
      <text x={12} y={pad.t - 10} fill="#FACC15" fontSize={10} fontWeight={700} fontFamily="JetBrains Mono, monospace">$/SQ FT</text>
      <text x={w - 12} y={pad.t - 10} textAnchor="end" fill="#22C55E" fontSize={10} fontWeight={700} fontFamily="JetBrains Mono, monospace">PERMITS</text>
      <g transform={`translate(${pad.l + 10}, ${pad.t + 6})`}>
        <rect x={0} y={0} width={12} height={3} rx={1.5} fill="#22C55E" />
        <text x={16} y={4} fill="#22C55E" fontSize={9} fontFamily="JetBrains Mono, monospace" fontWeight={600}>Permits (cumulative)</text>
        <rect x={155} y={0} width={12} height={3} rx={1.5} fill="#EF4444" />
        <text x={171} y={4} fill="#EF4444" fontSize={9} fontFamily="JetBrains Mono, monospace" fontWeight={600}>Build Cost $/ft²</text>
        <rect x={0} y={16} width={12} height={3} rx={1.5} fill="#FACC15" />
        <text x={16} y={20} fill="#FACC15" fontSize={9} fontFamily="JetBrains Mono, monospace" fontWeight={600}>Avg Sale Price (÷1000)</text>
        <rect x={185} y={16} width={12} height={3} rx={1.5} fill="#3B82F6" />
        <text x={201} y={20} fill="#3B82F6" fontSize={9} fontFamily="JetBrains Mono, monospace" fontWeight={600}>Median Lot (÷1000)</text>
      </g>
    </svg>
  );
}

function ProgressRing({ value, max, label, color, size = 110 }) {
  const pct = Math.min(value / max, 1);
  const r = (size - 12) / 2;
  const circ = 2 * Math.PI * r;
  return (
    <div style={{ textAlign: "center" }}>
      <svg width={size} height={size} viewBox={`0 0 ${size} ${size}`}>
        <circle cx={size / 2} cy={size / 2} r={r} fill="none" stroke="var(--bar-track)" strokeWidth={8} />
        <circle cx={size / 2} cy={size / 2} r={r} fill="none" stroke={color} strokeWidth={8}
          strokeDasharray={circ} strokeDashoffset={circ * (1 - pct)} strokeLinecap="round"
          transform={`rotate(-90 ${size / 2} ${size / 2})`} style={{ filter: `drop-shadow(0 0 6px ${color}66)` }} />
        <text x={size / 2} y={size / 2 - 4} textAnchor="middle" fill="var(--text)" fontSize={18} fontWeight={700} fontFamily="JetBrains Mono, monospace">{Math.round(pct * 100)}%</text>
        <text x={size / 2} y={size / 2 + 14} textAnchor="middle" fill="var(--muted)" fontSize={9} fontFamily="JetBrains Mono, monospace">{value.toLocaleString()}/{max.toLocaleString()}</text>
      </svg>
      <div style={{ fontSize: 11, color: "var(--muted)", marginTop: 4, fontWeight: 600 }}>{label}</div>
    </div>
  );
}

function AIRefreshPanel({ onDataRefresh }) {
  const [loading, setLoading] = useState(false);
  const [status, setStatus] = useState("");
  const [error, setError] = useState("");
  async function fetchLiveData() {
    setLoading(true); setError(""); setStatus("Searching for latest Altadena market data...");
    try {
      const res = await fetch("https://api.anthropic.com/v1/messages", {
        method: "POST", headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          model: "claude-sonnet-4-20250514", max_tokens: 1000,
          tools: [{ type: "web_search_20250305", name: "web_search" }],
          messages: [{ role: "user", content: `Search for the latest Altadena CA 91001 land prices, rebuilding costs per square foot, and Eaton Fire permit numbers as of March 2026. Return ONLY a JSON object with: avgBuildCost, medianLotPrice, permitsIssued, homesRebuilding, recentSales, notes` }],
        }),
      });
      const data = await res.json();
      const text = data.content?.filter(b => b.type === "text").map(b => b.text).join("") || "";
      setStatus("✓ Refresh complete");
      onDataRefresh({ text, timestamp: new Date().toLocaleString() });
    } catch (e) { setError("Could not connect. Pre-loaded data is still current (March 2026)."); setStatus(""); }
    setLoading(false);
  }
  return (
    <div className="dash-refresh" style={{ background: "linear-gradient(135deg, rgba(34,197,94,0.06) 0%, var(--card-bg) 100%)", borderRadius: 14, padding: "16px 22px", border: "1px solid rgba(34,197,94,0.2)", marginBottom: 24, display: "flex", alignItems: "center", gap: 16, flexWrap: "wrap" }}>
      <div style={{ flex: 1, minWidth: 200 }}>
        <div style={{ fontSize: 13, fontWeight: 700, color: "var(--text)", marginBottom: 2 }}>⚡ AI-Powered Live Refresh</div>
        <div style={{ fontSize: 11, color: "var(--muted)" }}>{status || "Web search for latest Redfin, Zillow, LA County permit data"}</div>
        {error && <div style={{ fontSize: 11, color: "var(--red)", marginTop: 4 }}>{error}</div>}
      </div>
      <button onClick={fetchLiveData} disabled={loading} style={{
        background: loading ? "var(--muted)" : "var(--green)", color: "#0A0C0A", border: "none", borderRadius: 8,
        padding: "10px 22px", fontSize: 13, fontWeight: 700, cursor: loading ? "wait" : "pointer", fontFamily: "var(--font-body)",
        boxShadow: loading ? "none" : "0 0 16px rgba(34,197,94,0.3)",
      }}>{loading ? "⏳ Searching..." : "🔄 Refresh Live Data"}</button>
    </div>
  );
}

    "─── ACTIVE LOT LISTINGS ───────────────────────────────────",
    ...d.landValues.listings.map(l => `  ${l.address.padEnd(26)} ${fmt(l.price).padStart(10)}   ${l.sqft.toLocaleString().padStart(6)} sqft   $${l.pricePerSqFt}/sqft`), "",
    "─── RECENT SALES (COMPS) ──────────────────────────────────",
    ...d.landValues.recentSales.map(s => `  ${s.address.padEnd(22)} ${fmt(s.price).padStart(10)}   ${s.date}   ${s.saleToList || "—"}`), "",
    "─── REBUILDING COST TIERS ─────────────────────────────────",
    ...d.rebuildCosts.tiers.map(t => `  ${t.tier.padEnd(20)} ${t.range.padEnd(20)} ${t.description}`), "",
    "─── PERMIT PROGRESS (LA County Dashboard 4/5/2026) ────────",
    `  Parcels Destroyed (Unincorp.): ${d.permits.parcelsImpacted.toLocaleString()}`,
    `  Units Destroyed:              ${d.permits.totalDestroyed.toLocaleString()}`,
    `  Applications Received:        ${d.permits.applicationsReceived.toLocaleString()}`,
    `  Zoning Reviews Cleared:       ${d.permits.zoningReviewsCleared.toLocaleString()}`,
    `  Plans Received (Parcels):     ${d.permits.plansReceived.toLocaleString()}`,
    `  Building Plans Approved:      ${d.permits.plansApproved.toLocaleString()}`,
    `  Building Permits Issued:      ${d.permits.totalPermitsIssued.toLocaleString()}`,
    `  In Construction (New Res.):   ${d.permits.homesActivelyRebuilding.toLocaleString()}`,
    `  Completed (New Res.):         ${d.permits.constructionCompleted}`,
    `  Avg Business Days:            ${d.permits.avgTotalDays} total (${d.permits.avgReviewDays} county + ${d.permits.avgApplicantDays} applicant)`, "",
    "  New Residential Breakdown (Issued / In Construction / Completed):",
    `    SFR:  1,551 / 990 / 21`,
    `    MFR:  1 / 1 / 0`,
    `    ADU:  174 / 97 / 9`, "",
    "  Monthly Cumulative Permits:",
    ...d.permits.timeline.map(t => `    ${t.month.padEnd(10)} +${t.permits.toString().padStart(4)} → ${t.cumulative.toLocaleString().padStart(5)} total`), "",
    "─── FULL COST BREAKDOWN ───────────────────────────────────",
    ...d.rebuildCosts.costBreakdown.map(c => `  ${c.category.padEnd(32)} ${c.range.padEnd(22)} ${c.note}`), "",
    "─── SOURCES ───────────────────────────────────────────────",
    "  Redfin, Zillow, LandSearch, LandWatch, Homes.com, ATTOM,",
    "  GreatBuildz, Kyra Construction, GO Home Builders,",
    "  Genesis Builders, LA County Recovery Dashboard, CalMatters,",
    "  NBC Los Angeles, LA Public Press, Marketplace.org", "",
    "═══════════════════════════════════════════════════════════",
    "  NOTE: For informational purposes only. Verify all figures",
    "  with local professionals before making financial decisions.",
    "═══════════════════════════════════════════════════════════",
  ];
  return lines.join("\n");
}

function BuildCalculator() {
  const [sqft, setSqft] = useState(2000);
  const [tier, setTier] = useState("mid");
  const [includeAdu, setIncludeAdu] = useState(false);
  const [lotCost, setLotCost] = useState(550000);
  const tiers = { basic: { lo: 300, hi: 450, label: "Basic", color: "var(--green)" }, mid: { lo: 450, hi: 600, label: "Mid-Range", color: "var(--yellow)" }, luxury: { lo: 600, hi: 800, label: "Luxury", color: "var(--red)" } };
  const t = tiers[tier];
  const buildLo = sqft * t.lo, buildHi = sqft * t.hi;
  const softCosts = 65000, siteCosts = 35000, landscaping = 40000;
  const aduCost = includeAdu ? 180000 : 0;
  const contingency = (buildLo + buildHi) / 2 * 0.12;
  const totalLo = lotCost + buildLo + softCosts + siteCosts + landscaping + aduCost;
  const totalHi = lotCost + buildHi + softCosts + siteCosts + landscaping + aduCost + contingency;

  return (
    <div>
      <div style={{ background: "var(--card-bg)", borderRadius: 14, padding: "24px", border: "1px solid var(--border)", marginBottom: 20 }}>
        <h3 style={{ fontSize: 15, fontFamily: "var(--font-display)", fontWeight: 700, marginTop: 0, marginBottom: 18 }}>Total Project Cost Estimator</h3>
        <div className="dash-calc-grid" style={{ display: "grid", gridTemplateColumns: "repeat(auto-fit, minmax(240px, 1fr))", gap: 20 }}>
          <div>
            <label style={{ fontSize: 11, fontWeight: 700, color: "var(--muted)", textTransform: "uppercase", letterSpacing: "0.08em" }}>Home Size: <span style={{ color: "var(--yellow)", fontFamily: "var(--font-mono)" }}>{sqft.toLocaleString()} sq ft</span></label>
            <input type="range" min={800} max={5000} step={50} value={sqft} onChange={(e) => setSqft(+e.target.value)} style={{ width: "100%", height: 6, borderRadius: 3, appearance: "none", background: "var(--bar-track)", outline: "none", cursor: "pointer", marginTop: 10, accentColor: "#FACC15" }} />
            <div style={{ display: "flex", justifyContent: "space-between", fontSize: 10, color: "var(--muted)", fontFamily: "var(--font-mono)" }}><span>800</span><span>5,000</span></div>
          </div>
          <div>
            <label style={{ fontSize: 11, fontWeight: 700, color: "var(--muted)", textTransform: "uppercase", letterSpacing: "0.08em" }}>Lot Cost: <span style={{ color: "var(--yellow)", fontFamily: "var(--font-mono)" }}>{fmt(lotCost)}</span></label>
            <input type="range" min={300000} max={1500000} step={10000} value={lotCost} onChange={(e) => setLotCost(+e.target.value)} style={{ width: "100%", height: 6, borderRadius: 3, appearance: "none", background: "var(--bar-track)", outline: "none", cursor: "pointer", marginTop: 10, accentColor: "#FACC15" }} />
            <div style={{ display: "flex", justifyContent: "space-between", fontSize: 10, color: "var(--muted)", fontFamily: "var(--font-mono)" }}><span>$300K</span><span>$1.5M</span></div>
          </div>
        </div>
        <div className="dash-tier-btns" style={{ display: "flex", gap: 10, margin: "18px 0", flexWrap: "wrap" }}>
          {Object.entries(tiers).map(([k, v]) => (
            <button key={k} onClick={() => setTier(k)} style={{
              background: tier === k ? v.color : "transparent", color: tier === k ? "#0A0C0A" : "var(--muted)",
              border: `1px solid ${tier === k ? v.color : "var(--border)"}`, borderRadius: 8, padding: "8px 16px",
              fontSize: 12, fontWeight: 700, cursor: "pointer", fontFamily: "var(--font-body)",
              boxShadow: tier === k ? `0 0 12px ${v.color === "var(--green)" ? "rgba(34,197,94,0.3)" : v.color === "var(--yellow)" ? "rgba(250,204,21,0.3)" : "rgba(239,68,68,0.3)"}` : "none",
            }}>{v.label} (${v.lo}–${v.hi}/ft²)</button>
          ))}
        </div>
        <label style={{ display: "flex", alignItems: "center", gap: 8, fontSize: 13, color: "var(--text)", cursor: "pointer" }}>
          <input type="checkbox" checked={includeAdu} onChange={(e) => setIncludeAdu(e.target.checked)} style={{ width: 16, height: 16, accentColor: "#22C55E" }} />
          Include ADU (+~$180K estimated)
        </label>
      </div>
      <div style={{ background: "var(--card-bg)", borderRadius: 14, padding: "24px", border: "1px solid rgba(250,204,21,0.2)" }}>
        <h3 style={{ fontSize: 15, fontFamily: "var(--font-display)", fontWeight: 700, marginTop: 0, marginBottom: 16, color: "var(--yellow)" }}>Estimated Total Project Cost</h3>
        <div className="dash-est-grid" style={{ display: "grid", gridTemplateColumns: "repeat(auto-fit, minmax(190px, 1fr))", gap: 12, marginBottom: 18 }}>
          <StatCard label="Low Estimate" value={fmt(totalLo)} accent="var(--green)" large />
          <StatCard label="High Estimate" value={fmt(totalHi)} subtext="Includes 12% contingency" accent="var(--red)" large />
        </div>
        <div style={{ fontSize: 13, color: "var(--text)", lineHeight: 1.9, fontFamily: "var(--font-mono)" }}>
          {[
            ["Lot Purchase", fmt(lotCost), "var(--blue)"],
            [`Construction (${sqft.toLocaleString()} ft² × $${t.lo}–$${t.hi})`, `${fmt(buildLo)} – ${fmt(buildHi)}`, t.color],
            ["Plans, Permits & Engineering", `~${fmt(softCosts)}`, "var(--muted)"],
            ["Site Prep & Grading", `~${fmt(siteCosts)}`, "var(--muted)"],
            ["Landscaping & Driveway", `~${fmt(landscaping)}`, "var(--muted)"],
            ...(includeAdu ? [["ADU (Accessory Dwelling Unit)", `~${fmt(aduCost)}`, "var(--green)"]] : []),
            ["Contingency (12%)", `~${fmt(Math.round(contingency))}`, "var(--orange)"],
          ].map(([label, val, color], i) => (
            <div key={i} style={{ display: "flex", justifyContent: "space-between", padding: "6px 0", borderBottom: "1px solid var(--border)" }}>
              <span style={{ color: "var(--muted)" }}>{label}</span><span style={{ color, fontWeight: 700 }}>{val}</span>
            </div>
          ))}
          <div style={{ display: "flex", justifyContent: "space-between", padding: "10px 0 4px", fontWeight: 800, fontSize: 16, color: "var(--yellow)" }}>
            <span>TOTAL RANGE</span><span>{fmt(totalLo)} – {fmt(totalHi)}</span>
          </div>
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<AltadenaDashboard />);
  </script>
</body>
</html>
